name: release

# tag → test → compile standalone binaries (Bun runtime embedded, zero deps
# for users) → GitHub Release. macOS-only on purpose: the collectors are
# macOS-bound today (claude.app discovery, pbcopy, osascript) — Linux waits
# on real collector portability, not on this pipeline.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15
            target: darwin-arm64
          - runner: macos-15-intel
            target: darwin-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun build --compile --minify --sourcemap src/index.tsx --outfile zadar
      - name: binary actually runs
        run: ./zadar --version
      - name: package + checksum
        run: |
          zip -j zadar-${{ matrix.target }}.zip zadar
          shasum -a 256 zadar-${{ matrix.target }}.zip > zadar-${{ matrix.target }}.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: zadar-${{ matrix.target }}
          path: zadar-${{ matrix.target }}.zip*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # for CHANGELOG.md
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # notes from the matching CHANGELOG.md section; fall back to auto-generated
          version="${GITHUB_REF_NAME#v}"
          awk -v v="## $version" '$0==v{g=1;next} g&&/^## /{exit} g{print}' CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then
            gh release create "${GITHUB_REF_NAME}" zadar-*.zip* \
              --title "${GITHUB_REF_NAME}" --notes-file notes.md
          else
            gh release create "${GITHUB_REF_NAME}" zadar-*.zip* \
              --title "${GITHUB_REF_NAME}" --generate-notes
          fi
